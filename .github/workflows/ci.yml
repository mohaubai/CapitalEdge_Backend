name: CapitalEdge CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch CapitalEdge Codebase
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Install flake8 and run it
        run: |
          pip install flake8
          flake8 .

      - name: Run tests using pytest
        run: pytest test_branches.py -v